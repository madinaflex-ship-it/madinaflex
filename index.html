<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madina Flex | Premium Printing Solutions Jhang</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root { --primary: #0d9488; --gold: #eab308; --dark: #020617; --white: #ffffff; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: var(--dark); }

        /* VERIFICATION SCREEN */
        #verify-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .v-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; text-align: center; color: white; }
        .v-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px; }

        /* MAIN CONTENT */
        #main-wrapper { display: none; }
    </style>
</head>
<body>

    <div id="verify-screen">
        <div class="v-box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
            <h2>Security Check</h2>
            <form id="verify-form">
                <div class="g-recaptcha" data-sitekey="6LeFWs4sAAAAANpln_6Wa--zbfVKEQM3SgIZqeWa" style="display: inline-block;"></div>
                <br>
                <button type="submit" class="v-btn">ENTER WEBSITE</button>
            </form>
        </div>
    </div>

    <div id="main-wrapper">
        <h1>Welcome to Madina Flex</h1>
        </div>

    <script>
        document.getElementById("verify-form").addEventListener("submit", function(e) {
            e.preventDefault();
            let response = grecaptcha.getResponse();

            if(response.length === 0) {
                alert("Please complete the Captcha!");
            } else {
                document.getElementById('verify-screen').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'block';
            }
        });
    </script>
</body>
</html>

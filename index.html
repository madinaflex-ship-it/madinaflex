<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madina Flex | Premium Printing Solutions Jhang</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root { 
            --primary: #0d9488; 
            --gold: #eab308; 
            --dark: #020617; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617;
            overflow-x: hidden;
        }

        /* VERIFICATION SCREEN */
        #verify-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .v-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
        }

        /* MAIN CONTENT - Initially Hidden */
        #main-wrapper { 
            display: none; 
            color: white;
            padding: 50px;
            text-align: center;
        }

        .v-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="verify-screen">
        <div class="v-box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
            <h2>Security Check</h2>
            <p style="opacity: 0.7; margin: 15px 0;">Please verify you are human to enter.</p>

            <form id="verify-form">
                <div class="g-recaptcha" 
                     data-sitekey="6LerZM4sAAAAACX24MqVRxzwcpvux2SeooP7OktQ" 
                     data-callback="onSuccess"
                     style="display: inline-block;">
                </div>
                <br>
                <button type="submit" class="v-btn">ENTER WEBSITE</button>
            </form>
        </div>
    </div>

    <div id="main-wrapper">
        <header>
            <h1 style="color: var(--gold);">Welcome to Madina Flex Center</h1>
            <p>Jhang's Premium Printing Destination</p>
        </header>
        </div>

    <script>
        // خودکار داخلہ جب کیپچا حل ہو جائے
        function onSuccess() {
            const screen = document.getElementById('verify-screen');
            const main = document.getElementById('main-wrapper');
            
            // خوبصورت اینیمیشن کے ساتھ غائب کرنا
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                main.style.display = 'block';
                // ویب سائٹ کو اوپر سے شروع کرنے کے لیے
                window.scrollTo(0, 0);
            }, 800);
        }

        // متبادل طریقہ: اگر صارف بٹن پر کلک کرے
        document.getElementById("verify-form").addEventListener("submit", function(e) {
            e.preventDefault();
            let response = grecaptcha.getResponse();

            if(response.length === 0) {
                alert("پہلے کیپچا ویریفائی کریں!");
            } else {
                onSuccess();
            }
        });

        // رائٹ کلک بلاک کرنا (ڈیزائن کے تحفظ کے لیے)
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

</body>
</html>
